# Reduire le buffer "non envoye" en memoire kernel (meilleur debit BBR)
net.ipv4.tcp_notsent_lowat = 16384

# Dirty bytes absolus (mieux que ratio sur 62GB RAM)
vm.dirty_bytes = 4294967296
vm.dirty_background_bytes = 1073741824

# Maximiser le page cache pour le seeding (evite swap = preserve 57GB cache disque)
vm.swappiness = 1

# Ports éphémères étendus pour connexions sortantes (trackers, DHT, peers outbound)
# Défaut : 32768-60999 (28k ports) → 1024-65000 (64k ports)
net.ipv4.ip_local_port_range = 1024 65000

# Plafond mémoire kernel TCP : 12 GB (défaut ~6 GB sur 62 GB RAM)
net.ipv4.tcp_mem = 1500000 2000000 3000000
