# seedbox.conf — Config centralisee pour les scripts seedbox ropixv2
# Sourceable en bash (source seedbox.conf) et parseable en Python (load_conf())
# Pas de quotes, pas d'espaces autour de =

# ── Utilisateur ───────────────────────────────────────────────────────────────
SEEDBOX_USER=ropixv2
QBITTORRENT_URL=http://localhost:8181
QBITTORRENT_USER=ropixv2
QBITTORRENT_PASS=Lip8NebW8Z8HrbX

# Legacy (pour scripts qui n'ont pas encore migre)
RTORRENT_SOCK=/var/run/rtorrent/ropixv2.sock

# ── Chemins ───────────────────────────────────────────────────────────────────
NVME_DOWNLOADS=/mnt/nvme-seedbox/ropixv2/downloads
RAID_DOWNLOADS=/home/storage/users/ropixv2/downloads
LOG_DIR=/var/www/sharebox/data/logs
STATE_DIR=/var/www/sharebox/data

# ── Migration NVMe -> RAID ────────────────────────────────────────────────────

# Espace libre minimum sur NVMe avant eviction forcee (Go)
NVME_MIN_FREE_GB=200

# Fenetre de calcul de la vitesse moyenne (heures)
SPEED_WINDOW_H=48

# Seuil "froid" : en-dessous de cette vitesse moyenne le torrent migre (KB/s)
COLD_THRESHOLD_KBPS=1024

# Donnees minimum avant de prendre une decision "froid" (heures)
SPEED_MIN_HISTORY_H=6

# Fichier d'etat pour le suivi des vitesses (JSON)
NVME_SPEED_STATE=/var/www/sharebox/data/nvme-speed-state.json

# Marge de securite en plus de la taille du torrent pour accepter sur NVMe (Go)
NVME_MARGIN_GB=50

# ── Tuning I/O (2026-04-04) ──────────────────────────────────────────────────
#
# Readahead RAID:
#   md0=4096 sectors (2MB), persisté via /etc/systemd/system/raid-readahead.service
#
# Client torrent: qBittorrent 4.5.2 + libtorrent-rasterbar 2.0.8
#   Migration depuis rtorrent 0.16.8 (bug SocketManager)
#   Config: /home/storage/users/ropixv2/.config/qBittorrent/qBittorrent.conf
#   Service: qbittorrent@ropixv2.service
#   WebUI: http://localhost:8181
