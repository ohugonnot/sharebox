user www-data;
worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    access_log    /dev/stdout;

    # Pas de limite — streaming de gros fichiers
    client_max_body_size 0;

    # Timeouts longs pour le streaming (films 2h+)
    fastcgi_read_timeout 14400;
    fastcgi_send_timeout 14400;
    proxy_read_timeout   14400;

    server {
        listen 80 default_server;
        server_name _;
        root /app;

        # Favicon (public)
        location = /share/favicon.svg {
            auth_basic off;
            alias /app/favicon.svg;
        }

        # Assets publics (player sur les pages /dl/)
        location ~ ^/share/(player\.js|player\.css)$ {
            auth_basic off;
            alias /app/$1;
        }

        # Admin panel (protégé)
        location ^~ /share {
            alias /app;
            auth_basic "ShareBox";
            auth_basic_user_file /etc/sharebox.htpasswd;

            location ^~ /share/data {
                deny all;
            }

            location ~ \.php$ {
                include fastcgi_params;
                fastcgi_pass 127.0.0.1:9000;
                fastcgi_param SCRIPT_FILENAME $request_filename;
                fastcgi_read_timeout 14400;
            }

            index index.php;
            try_files $uri $uri/ /share/index.php?$query_string;
        }

        # URLs publiques de téléchargement
        location ~ "^/dl/([a-z0-9][a-z0-9-]{1,50})$" {
            include fastcgi_params;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME /app/download.php;
            fastcgi_param QUERY_STRING token=$1&$args;
            fastcgi_read_timeout 14400;
        }

        # X-Accel-Redirect pour servir les fichiers
        location /internal-download/ {
            internal;
            alias /;
        }
    }
}
