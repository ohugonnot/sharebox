name: E2E Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sharebox-test .

      - name: Start demo container
        run: |
          docker run -d --name sharebox-demo \
            -p 8088:80 \
            -e SHAREBOX_ADMIN_USER=admin \
            -e SHAREBOX_ADMIN_PASS=testpass \
            -e SHAREBOX_DEMO_DATA=true \
            sharebox-test
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8088/dl/browse > /dev/null 2>&1; then
              echo "Container ready after ${i}s"
              break
            fi
            sleep 1
          done

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          npm ci --ignore-scripts
          npx playwright install chromium --with-deps

      - name: Run E2E tests
        env:
          SHAREBOX_TEST_URL: http://localhost:8088
          SHAREBOX_TEST_USER: admin
          SHAREBOX_TEST_PASS: testpass
        run: npx playwright test tests/e2e/comprehensive.spec.ts tests/e2e/streaming.spec.ts --reporter=list

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Container logs on failure
        if: failure()
        run: docker logs sharebox-demo
